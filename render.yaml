services:
  - type: web
    name: smartmed-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: TOKEN_SECRET
        sync: false
